name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Go
        # actions/setup-go@v6
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: false

      - name: Run tests
        run: go test ./...

      - name: Run golangci-lint
        run: |
          docker run --rm \
            -e GOLANGCI_LINT_CACHE=/tmp/golangci-lint-cache \
            -v "${PWD}":/app \
            -w /app \
            golangci/golangci-lint@sha256:568ee1c1c53493575fa9494e280e579ac9ca865787bafe4df3023ae59ecf299b \
            golangci-lint run

      - name: Build binary
        run: go build ./cmd/canton-devkit
