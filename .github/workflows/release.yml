name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Go
        # actions/setup-go@v6
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: false

      - name: Set release metadata
        id: meta
        run: |
          short_sha="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="main-${short_sha}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build release binaries
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              output="dist/canton-devkit_${os}_${arch}"
              if [ "$os" = "windows" ]; then output="${output}.exe"; fi
              GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build \
                -ldflags "-s -w -X main.version=${VERSION}" \
                -o "$output" ./cmd/canton-devkit
            done
          done

      - name: Upload main branch artifacts
        if: github.ref == 'refs/heads/main'
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: canton-devkit-${{ steps.meta.outputs.version }}
          path: dist/*

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        # softprops/action-gh-release@v3
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: dist/*

  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Docker Buildx
        # docker/setup-buildx-action@v4
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to GHCR
        # docker/login-action@v4
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          short_sha="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="main-${short_sha}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          {
            echo "tags<<EOF"
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              echo "${IMAGE_NAME}:${version}"
              echo "${IMAGE_NAME}:latest"
            else
              echo "${IMAGE_NAME}:main"
              echo "${IMAGE_NAME}:sha-${short_sha}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        # docker/build-push-action@v7
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
